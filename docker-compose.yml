version: '3.8'

services:
  xiaoai-ha-bridge:
    image: xiaoai-ha-bridge:local
    container_name: xiaoai-ha-bridge
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - xiaoai_config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  xiaoai_config:
